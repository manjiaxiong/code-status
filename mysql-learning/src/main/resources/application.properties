# =====================================================
# Spring Boot 配置文件
# =====================================================
# 作用：配置应用行为，类似前端的 .env 或 config.js
#
# 常见配置：
# - 服务器端口
# - 数据库连接
# - 日志级别
# - 功能开关
# =====================================================

# ------------------- 服务器配置 -------------------
# 设置应用运行的端口号（默认 8080）
# 类似前端：app.listen(8080)
server.port=18080

# ------------------- 应用名称 -------------------
# 用于日志、监控等场景
spring.application.name=mysql-learning

# ------------------- 数据库配置 -------------------
#
# ===== MySQL 配置（正式使用）=====
# 数据库连接 URL
# 格式：jdbc:mysql://主机:端口/数据库名？参数
# 参数说明：
# - useSSL=false: 禁用 SSL（开发环境）
# - serverTimezone=Asia/Shanghai: 设置时区为上海时间
# - characterEncoding=utf-8: 设置字符编码
# - allowPublicKeyRetrieval=true: 允许公钥检索（MySQL 8.0+）
#
spring.datasource.url=jdbc:mysql://localhost:3306/demo?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
#
# 数据库用户名
spring.datasource.username=root
#
# 数据库密码（请根据实际情况修改）
spring.datasource.password=123456
#
# MySQL 驱动类名（Spring Boot 2.x 需要）
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------- JPA 配置 -------------------
# JPA = Java Persistence API，用于操作数据库
# 类似前端的 TypeORM、Prisma
#
# hibernate.ddl-auto 作用：自动管理数据库表结构
# 可选值：
# - none     : 不处理（生产环境推荐）
# - validate : 验证表结构，不一致就报错
# - update   : 自动更新表结构（开发环境推荐）
# - create   : 每次启动都删除重建表（测试用）
# - create-drop: 启动创建，关闭删除
#
spring.jpa.hibernate.ddl-auto=update
#
# show-sql: 是否在控制台显示 SQL 语句
spring.jpa.show-sql=true
#
# format-sql: SQL 是否格式化（更美观）
spring.jpa.format-sql=true

# ------------------- H2 内存数据库（临时禁用）=====
# 如果无法连接 MySQL，可以临时启用 H2 进行测试
# 注意：下面配置已注释，启用需要取消注释并注释掉上面 MySQL 配置
#
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true

# ------------------- 日志配置 -------------------
# 设置日志级别：ERROR > WARN > INFO > DEBUG > TRACE
# 默认是 INFO，显示基本信息
#
# 全局日志级别
# logging.level.root=INFO
#
# 设置特定包的日志级别
# logging.level.com.example.demo=DEBUG
# logging.level.org.springframework.web=DEBUG

# ------------------- JSON 配置 -------------------
# Jackson 是 Spring Boot 默认的 JSON 处理库
#
# 日期格式（Date 转 JSON 时的格式）
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
#
# 时区
spring.jackson.time-zone=Asia/Shanghai
#
# 序列化特性
# 是否允许 JSON 中有未知字段（默认 false）
# spring.jackson.deserialization.fail-on-unknown-properties=false
