# =====================================================
# MyBatis-Plus 学习项目配置
# =====================================================
#
# ★★★ 和 mysql-learning 的区别 ★★★
#
# 相同点：
# - 数据库连接配置完全一样（连同一个 demo 库）
# - JSON 配置一样
#
# 不同点：
# - 端口不同：这里 18081，mysql-learning 是 18080（可以同时跑）
# - 没有 JPA 配置（spring.jpa.xxx 全部不需要了）
# - 新增 mybatis-plus 配置（SQL日志、驼峰映射）
#
# mysql-learning 有但这里没有的配置：
# - spring.jpa.hibernate.ddl-auto=update  （JPA 自动建表）
# - spring.jpa.show-sql=true              （JPA 打印 SQL）
# - spring.jpa.format-sql=true            （JPA 格式化 SQL）
# - H2 内存数据库配置
#
# 这里新增的配置：
# - mybatis-plus.configuration.log-impl   （MP 打印 SQL）
# - mybatis-plus.configuration.map-underscore-to-camel-case （驼峰映射）
# =====================================================

# ------------------- 服务器配置 -------------------
server.port=18081

spring.application.name=mybatis-plus-learning

# ------------------- 数据库配置（和 mysql-learning 一样） -------------------
spring.datasource.url=jdbc:mysql://localhost:3306/demo?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------- MyBatis-Plus 专属配置 -------------------
# 开启 SQL 日志（控制台打印执行的 SQL，方便学习）
# 作用等同于 mysql-learning 的 spring.jpa.show-sql=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 驼峰命名自动映射（数据库 create_time → Java createTime）
# MyBatis-Plus 默认就是 true，写出来让你知道有这个配置
# JPA 也有类似功能，但是通过 @Column(name="create_time") 注解实现的
mybatis-plus.configuration.map-underscore-to-camel-case=true

# ------------------- JSON 配置（和 mysql-learning 一样） -------------------
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai
