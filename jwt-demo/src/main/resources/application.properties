# =====================================================
# Spring Boot 配置文件
# =====================================================
# 作用：配置应用行为，类似前端的 .env 或 config.js
#
# 常见配置：
# - 服务器端口
# - 数据库连接
# - 日志级别
# - 功能开关
# =====================================================

# ------------------- 服务器配置 -------------------
# 设置应用运行的端口号（默认 8080）
# 类似前端：app.listen(8080)
server.port=18080

# ------------------- 应用名称 -------------------
# 用于日志、监控等场景
spring.application.name=springboot-demo

# ------------------- 数据库配置 -------------------
# 注意：下面是 MySQL 配置示例，暂时注释掉，后面用数据库时再开启
#
# 数据库连接 URL
# 格式：jdbc:mysql://主机:端口/数据库名？参数
# spring.datasource.url=jdbc:mysql://localhost:3306/demo?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8
#
# 数据库用户名
# spring.datasource.username=root
#
# 数据库密码
# spring.datasource.password=root
#
# MySQL 驱动类名（Spring Boot 2.x 需要）
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------- JPA 配置 -------------------
# JPA = Java Persistence API，用于操作数据库
# 类似前端的 TypeORM、Prisma
#
# hibernate.ddl-auto 作用：自动管理数据库表结构
# 可选值：
# - none     : 不处理（生产环境推荐）
# - validate : 验证表结构，不一致就报错
# - update   : 自动更新表结构（开发环境推荐）
# - create   : 每次启动都删除重建表（测试用）
# - create-drop: 启动创建，关闭删除
#
# spring.jpa.hibernate.ddl-auto=update
#
# show-sql: 是否在控制台显示 SQL 语句
# spring.jpa.show-sql=true
#
# format-sql: SQL 是否格式化（更美观）
# spring.jpa.format-sql=true

# ------------------- 临时禁用数据库配置 -------------------
# 使用 H2 内存数据库，无需安装 MySQL 即可运行
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# ------------------- JWT 配置 -------------------
# JWT 密钥（至少 32 个字符，实际项目中应该用环境变量）
jwt.secret=mySecretKey123456789012345678901234567890
# Token 过期时间（毫秒）- 7 天 = 604800000
jwt.expiration=604800000

# ------------------- 日志配置 -------------------
# 设置日志级别：ERROR > WARN > INFO > DEBUG > TRACE
# 默认是 INFO，显示基本信息
#
# 全局日志级别
# logging.level.root=INFO
#
# 设置特定包的日志级别
# logging.level.com.example.demo=DEBUG
# logging.level.org.springframework.web=DEBUG

# ------------------- JSON 配置 -------------------
# Jackson 是 Spring Boot 默认的 JSON 处理库
#
# 日期格式（Date 转 JSON 时的格式）
# spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
#
# 时区
# spring.jackson.time-zone=Asia/Shanghai
#
# 序列化特性
# 是否允许 JSON 中有未知字段（默认 false）
# spring.jackson.deserialization.fail-on-unknown-properties=false
